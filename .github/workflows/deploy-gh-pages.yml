name: Deploy VitePress Docs to GitHub Pages

on:
  push:
    branches:
      - master  # 在 master 分支推送时触发
    paths:
      - 'docs/**' # 仅在 docs 目录下的文件发生更改时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master  # 检出 master 分支
          path: master  # 检出到 master 目录

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Dependencies
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: master/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('master/yarn.lock') }}

      - name: Install Dependencies
        run: |
          cd master
          yarn install # 不使用 --frozen-lockfile，允许更新 yarn.lock

      - name: Build VitePress Site
        run: cd master && yarn build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          clean: false # 保留 gh-pages 分支的内容

      - name: Create gh-pages/docs directory if it doesn't exist
        run: |
          cd gh-pages
          mkdir -p docs

      - name: Copy build output to gh-pages
        run: |
          rm -rf gh-pages/docs/*  # 清空 gh-pages/docs 目录
          cp -r master/docs/.vitepress/dist/* gh-pages/docs/  # 复制构建输出

      - name: Commit and push changes to gh-pages
        run: |
          cd gh-pages
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Deploy VitePress site to gh-pages" || echo "No changes to commit"
          git push origin gh-pages
